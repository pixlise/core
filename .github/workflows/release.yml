name: Core Release

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE_24: true

jobs:
  release:
    uses: ./.github/workflows/main.yml
    with:
      version_format: '${major}.${minor}.${patch}'
    secrets: inherit
